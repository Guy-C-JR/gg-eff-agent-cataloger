agent_yaml_schema:
  type: object
  required:
    - agent_id
    - agent_name
    - description
    - entrypoint
    - tools
    - data_sources
  properties:
    agent_id:
      type: string
    agent_name:
      type: string
    description:
      type: string
    entrypoint:
      type: string
    tools:
      type: array
      items:
        type: object
        required: [tool_id, tool_name, purpose, data_sources, permissions]
        properties:
          tool_id: { type: string }
          tool_name: { type: string }
          purpose: { type: string }
          data_sources:
            type: array
            items:
              type: object
              properties:
                name: { type: string }
                type: { type: string }
                environment: { type: string }
          permissions:
            type: string
            description: read|write|read_write|admin
    data_sources:
      type: array
      items:
        type: object
        required: [name, type, environment, owner, notes]
        properties:
          name: { type: string }
          type: { type: string }
          environment: { type: string }
          owner: { type: string }
          notes: { type: string }
